<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexFit | 运动社区</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="navbar">
                <a href="#" class="logo">ApexFit</a>
                <ul class="nav-menu">
                    <li><a href="#" id="nav-home">首页</a></li>
                    <li><a href="#" id="nav-social" class="active">运动社区</a></li>
                    <li><a href="#" id="nav-profile">个人中心</a></li>
                </ul>
                <div class="auth-buttons" id="authButtons">
                    <button class="btn-outline-small" id="loginBtn">登录</button>
                    <button class="btn-dark-small" id="registerBtn">注册</button>
                </div>
                <div class="user-info" id="userInfo" style="display:none;">
                    <span id="usernameDisplay"></span>
                    <button class="btn-outline-small" id="logoutBtn">退出</button>
                </div>
            </div>
        </div>
    </header>

    <main class="social-main">
        <div class="container">
            <div class="social-layout">
                <div class="post-section">
                    <div class="post-card">
                        <h3>发布动态</h3>
                        <textarea id="postContent" placeholder="分享你的运动瞬间..." maxlength="500"></textarea>
                        <div class="image-upload">
                            <input type="file" id="postImage" accept="image/*">
                            <label for="postImage" class="upload-label">📷 添加图片</label>
                            <div id="imagePreview"></div>
                        </div>
                        <button class="btn-dark" id="publishBtn">发布 →</button>
                    </div>
                </div>

                <div class="feed-section">
                    <h3>最新动态</h3>
                    <div id="postsList" class="posts-list">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 登录/注册模态框 -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="loginForm">
                <h3>登录</h3>
                <input type="text" id="loginUsername" placeholder="用户名">
                <input type="password" id="loginPassword" placeholder="密码">
                <button class="btn-dark" id="doLoginBtn">登录</button>
                <p>没有账号？<a href="#" id="switchToRegister">立即注册</a></p>
            </div>
            <div id="registerForm" style="display:none;">
                <h3>注册</h3>
                <input type="text" id="regUsername" placeholder="用户名">
                <input type="password" id="regPassword" placeholder="密码">
                <input type="password" id="regConfirmPassword" placeholder="确认密码">
                <button class="btn-dark" id="doRegisterBtn">注册</button>
                <p>已有账号？<a href="#" id="switchToLogin">返回登录</a></p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>© 2025 ApexFit — 运动社区，分享你的进步</p>
        </div>
    </footer>

    <script>
        // ============================================
        // Supabase 配置
        // ============================================
        const SUPABASE_URL = 'https://mlvyibpftjdseaodlqff.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sdnlpYnBmdGpkc2Vhb2RscWZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjY4MzIsImV4cCI6MjA5MTY0MjgzMn0.fZiHQ9IHIO6dkt7nNxmu5eNmkuYfxjlw6mKMX-eTI6I';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // 当前用户
        let currentUser = null;
        
        // ============================================
        // 认证函数
        // ============================================
        async function register(username, password) {
            try {
                const email = `${username}@apexfit.local`;
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: { username: username } }
                });
                
                if (authError) throw new Error(authError.message);
                
                if (!authData.user) throw new Error('注册失败');
                
                // 添加到 profiles 表
                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert([{ id: authData.user.id, username: username }]);
                
                if (profileError) console.warn('Profile创建警告:', profileError);
                
                currentUser = {
                    id: authData.user.id,
                    username: username
                };
                
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                return { success: true };
            } catch (error) {
                console.error('注册失败:', error);
                return { success: false, message: error.message };
            }
        }
        
        async function login(username, password) {
            try {
                const email = `${username}@apexfit.local`;
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw new Error('用户名或密码错误');
                
                currentUser = {
                    id: data.user.id,
                    username: username
                };
                
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                return { success: true };
            } catch (error) {
                console.error('登录失败:', error);
                return { success: false, message: error.message };
            }
        }
        
        function logout() {
            supabase.auth.signOut();
            currentUser = null;
            localStorage.removeItem('currentUser');
            updateAuthUI();
            renderPosts();
        }
        
        function getCurrentUser() {
            return currentUser;
        }
        
        async function restoreSession() {
            const stored = localStorage.getItem('currentUser');
            if (stored) {
                currentUser = JSON.parse(stored);
            }
            
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                currentUser = null;
                localStorage.removeItem('currentUser');
            }
            
            updateAuthUI();
            return currentUser;
        }
        
        function updateAuthUI() {
            const authButtons = document.getElementById('authButtons');
            const userInfo = document.getElementById('userInfo');
            const usernameDisplay = document.getElementById('usernameDisplay');
            
            if (currentUser && authButtons && userInfo) {
                authButtons.style.display = 'none';
                userInfo.style.display = 'flex';
                if (usernameDisplay) usernameDisplay.textContent = currentUser.username;
            } else if (authButtons && userInfo) {
                authButtons.style.display = 'flex';
                userInfo.style.display = 'none';
            }
        }
        
        // ============================================
        // 帖子相关函数
        // ============================================
        async function publishPost(content, imageBase64 = null) {
            if (!currentUser) {
                alert('请先登录');
                return false;
            }
            
            try {
                const { error } = await supabase
                    .from('posts')
                    .insert([{
                        content: content,
                        author: currentUser.username,
                        author_id: currentUser.id,
                        image: imageBase64,
                        likes: 0,
                        created_at: new Date().toISOString()
                    }]);
                
                if (error) throw error;
                return { success: true };
            } catch (error) {
                return { success: false, message: error.message };
            }
        }
        
        async function getPosts() {
            try {
                const { data: posts, error } = await supabase
                    .from('posts')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                let userLikes = [];
                if (currentUser) {
                    const { data: likes } = await supabase
                        .from('likes')
                        .select('post_id')
                        .eq('user_id', currentUser.id);
                    userLikes = likes?.map(l => l.post_id) || [];
                }
                
                return { posts: posts || [], userLikes };
            } catch (error) {
                console.error('获取动态失败:', error);
                return { posts: [], userLikes: [] };
            }
        }
        
        async function likePost(postId) {
            if (!currentUser) {
                alert('请先登录');
                return false;
            }
            
            try {
                const { data: existing } = await supabase
                    .from('likes')
                    .select('id')
                    .eq('post_id', postId)
                    .eq('user_id', currentUser.id)
                    .maybeSingle();
                
                if (existing) {
                    await supabase.from('likes').delete().eq('id', existing.id);
                    await supabase.rpc('decrement_likes', { post_id: postId });
                    return { success: true, action: 'unliked' };
                } else {
                    await supabase.from('likes').insert([{
                        post_id: postId,
                        user_id: currentUser.id,
                        username: currentUser.username
                    }]);
                    await supabase.rpc('increment_likes', { post_id: postId });
                    return { success: true, action: 'liked' };
                }
            } catch (error) {
                return { success: false, message: error.message };
            }
        }
        
        async function addComment(postId, content) {
            if (!currentUser) {
                alert('请先登录');
                return false;
            }
            
            try {
                const { error } = await supabase
                    .from('comments')
                    .insert([{
                        post_id: postId,
                        content: content,
                        author: currentUser.username,
                        author_id: currentUser.id,
                        created_at: new Date().toISOString()
                    }]);
                
                if (error) throw error;
                return { success: true };
            } catch (error) {
                return { success: false, message: error.message };
            }
        }
        
        async function getComments(postId) {
            try {
                const { data, error } = await supabase
                    .from('comments')
                    .select('*')
                    .eq('post_id', postId)
                    .order('created_at', { ascending: true });
                
                if (error) throw error;
                return data || [];
            } catch (error) {
                return [];
            }
        }
        
        // ============================================
        // 渲染函数
        // ============================================
        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return '刚刚';
            if (minutes < 60) return `${minutes}分钟前`;
            if (hours < 24) return `${hours}小时前`;
            return `${days}天前`;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function renderPosts() {
            const postsList = document.getElementById('postsList');
            if (!postsList) return;
            
            postsList.innerHTML = '<div class="loading">加载中...</div>';
            
            const { posts, userLikes } = await getPosts();
            
            if (posts.length === 0) {
                postsList.innerHTML = '<div class="loading">暂无动态，快来发布第一条吧！</div>';
                return;
            }
            
            postsList.innerHTML = '';
            
            for (const post of posts) {
                const comments = await getComments(post.id);
                
                const postDiv = document.createElement('div');
                postDiv.className = 'post-item';
                
                const timeStr = formatTime(new Date(post.created_at));
                const isLiked = userLikes.includes(post.id);
                
                postDiv.innerHTML = `
                    <div class="post-header">
                        <span class="post-author">🏋️ ${escapeHtml(post.author)}</span>
                        <span class="post-time">${timeStr}</span>
                    </div>
                    <div class="post-content">${escapeHtml(post.content || '')}</div>
                    ${post.image ? `<img src="${post.image}" class="post-image" alt="post image" loading="lazy">` : ''}
                    <div class="post-actions">
                        <button class="action-btn like-btn ${isLiked ? 'liked' : ''}" data-id="${post.id}">
                            ❤️ ${post.likes || 0}
                        </button>
                        <button class="action-btn comment-toggle-btn" data-id="${post.id}">
                            💬 ${comments.length}
                        </button>
                    </div>
                    <div class="comments-section" id="comments-${post.id}" style="display:none;">
                        <div class="comment-list" id="comment-list-${post.id}">
                            ${comments.map(c => `<div class="comment-item"><span class="comment-author">${escapeHtml(c.author)}:</span> ${escapeHtml(c.content)}</div>`).join('')}
                        </div>
                        <div class="comment-input">
                            <input type="text" id="comment-input-${post.id}" placeholder="写下你的评论...">
                            <button onclick="submitComment('${post.id}')">发送</button>
                        </div>
                    </div>
                `;
                
                postsList.appendChild(postDiv);
            }
            
            // 绑定点赞事件
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const postId = btn.dataset.id;
                    await likePost(postId);
                    renderPosts();
                });
            });
            
            // 绑定评论展开事件
            document.querySelectorAll('.comment-toggle-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const postId = btn.dataset.id;
                    const commentsDiv = document.getElementById(`comments-${postId}`);
                    if (commentsDiv.style.display === 'none') {
                        commentsDiv.style.display = 'block';
                    } else {
                        commentsDiv.style.display = 'none';
                    }
                });
            });
        }
        
        window.submitComment = async function(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            const content = input.value.trim();
            if (!content) return;
            
            const result = await addComment(postId, content);
            if (result.success) {
                input.value = '';
                renderPosts();
            } else {
                alert(result.message);
            }
        };
        
        function imageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        // ============================================
        // 模态框和事件绑定（关键！）
        // ============================================
        const modal = document.getElementById('authModal');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const closeBtn = document.querySelector('.close');
        
        // 打开登录模态框
        if (loginBtn) {
            loginBtn.addEventListener('click', () => {
                console.log('登录按钮被点击');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
                modal.style.display = 'block';
            });
        } else {
            console.error('找不到 loginBtn 元素');
        }
        
        // 打开注册模态框
        if (registerBtn) {
            registerBtn.addEventListener('click', () => {
                console.log('注册按钮被点击');
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
                modal.style.display = 'block';
            });
        } else {
            console.error('找不到 registerBtn 元素');
        }
        
        // 关闭模态框
        if (closeBtn) {
            closeBtn.addEventListener('click', () => {
                modal.style.display = 'none';
            });
        }
        
        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });
        
        // 切换到注册表单
        document.getElementById('switchToRegister')?.addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        });
        
        // 切换到登录表单
        document.getElementById('switchToLogin')?.addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        });
        
        // 登录提交
        document.getElementById('doLoginBtn')?.addEventListener('click', async () => {
            console.log('登录提交');
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                alert('请填写完整信息');
                return;
            }
            
            const result = await login(username, password);
            if (result.success) {
                modal.style.display = 'none';
                updateAuthUI();
                renderPosts();
                alert('登录成功！');
            } else {
                alert(result.message);
            }
        });
        
        // 注册提交
        document.getElementById('doRegisterBtn')?.addEventListener('click', async () => {
            console.log('注册提交');
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            
            if (!username || !password) {
                alert('请填写完整信息');
                return;
            }
            
            if (password !== confirm) {
                alert('两次输入的密码不一致');
                return;
            }
            
            if (password.length < 6) {
                alert('密码长度至少6位');
                return;
            }
            
            const result = await register(username, password);
            if (result.success) {
                alert('注册成功！已自动登录');
                modal.style.display = 'none';
                updateAuthUI();
                renderPosts();
            } else {
                alert(result.message);
            }
        });
        
        // 退出登录
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            logout();
        });
        
        // 发布动态
        document.getElementById('publishBtn')?.addEventListener('click', async () => {
            if (!currentUser) {
                alert('请先登录');
                return;
            }
            
            const content = document.getElementById('postContent').value.trim();
            const imageFile = document.getElementById('postImage').files[0];
            
            if (!content && !imageFile) {
                alert('请填写内容或添加图片');
                return;
            }
            
            let imageBase64 = null;
            if (imageFile) {
                imageBase64 = await imageToBase64(imageFile);
            }
            
            const result = await publishPost(content, imageBase64);
            if (result.success) {
                document.getElementById('postContent').value = '';
                document.getElementById('postImage').value = '';
                document.getElementById('imagePreview').innerHTML = '';
                renderPosts();
            } else {
                alert(result.message);
            }
        });
        
        // 图片预览
        document.getElementById('postImage')?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    document.getElementById('imagePreview').innerHTML = `<img src="${event.target.result}" alt="preview">`;
                };
                reader.readAsDataURL(file);
            }
        });
        
        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('页面加载完成');
            await restoreSession();
            await renderPosts();
        });
        
        // 导航菜单
        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                if (link.id === 'nav-home') {
                    alert('首页正在建设中');
                } else if (link.id === 'nav-profile') {
                    if (currentUser) {
                        alert(`欢迎 ${currentUser.username}！个人中心即将上线`);
                    } else {
                        alert('请先登录');
                    }
                }
            });
        });
    </script>
</body>
</html>
