<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ApexFit | 运动健康首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFFFFF;
            color: #000000;
            font-family: '微软雅黑', 'Microsoft YaHei', 'Segoe UI', sans-serif;
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
        }

        .header {
            background-color: #FFFFFF;
            border-bottom: 1px solid #E6E6E6;
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #000000;
            text-decoration: none;
            font-family: '微软雅黑', 'Microsoft YaHei', sans-serif;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 36px;
            align-items: center;
        }

        .nav-links li a {
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            color: #1A1A1A;
            font-family: '微软雅黑', 'Microsoft YaHei', sans-serif;
            transition: all 0.2s ease;
            padding-bottom: 6px;
            border-bottom: 2px solid transparent;
        }

        .nav-links li a:hover {
            color: #000000;
            border-bottom-color: #000000;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .username-btn {
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            font-family: '微软雅黑', sans-serif;
            color: #000;
        }

        .btn-outline-small {
            background: transparent;
            border: 1px solid #AAAAAA;
            color: #2C2C2C;
            padding: 8px 16px;
            border-radius: 48px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-dark-small {
            background: #000000;
            color: #FFFFFF;
            border: none;
            padding: 8px 16px;
            border-radius: 48px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }

        .hero {
            text-align: center;
            padding: 80px 0 64px 0;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero h1 {
            font-size: 72px;
            font-weight: 800;
            letter-spacing: -2px;
            color: #000000;
            margin-bottom: 28px;
            line-height: 1.1;
            font-family: 'Inter', '微软雅黑', 'Montserrat', system-ui, sans-serif;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 20px;
            font-weight: 400;
            color: #2C2C2C;
            font-family: '微软雅黑', 'Microsoft YaHei', sans-serif;
            margin-bottom: 48px;
            letter-spacing: 0.3px;
        }

        .btn-dark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: #000000;
            color: #FFFFFF;
            font-family: '微软雅黑', 'Microsoft YaHei', sans-serif;
            font-size: 20px;
            font-weight: 700;
            text-decoration: none;
            padding: 14px 36px;
            border-radius: 48px;
            border: 2px solid #000000;
            cursor: pointer;
            transition: all 0.25s ease-in-out;
        }

        .btn-dark:hover {
            background-color: #FFFFFF;
            color: #000000;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -12px rgba(0,0,0,0.25);
        }

        .features {
            padding: 72px 0 80px 0;
            border-top: 1px solid #EAEAEA;
            background-color: #FFFFFF;
        }

        .section-title {
            text-align: center;
            font-size: 32px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 56px;
            letter-spacing: -0.3px;
        }

        .features-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
        }

        .feature-card {
            flex: 1;
            min-width: 240px;
            background: #FFFFFF;
            border: 1px solid #E8E8E8;
            border-radius: 28px;
            padding: 32px 24px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-6px);
            border-color: #CCCCCC;
        }

        .feature-icon {
            font-size: 44px;
            margin-bottom: 20px;
        }

        .feature-card h3 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 14px;
            color: #000000;
        }

        .feature-card p {
            font-size: 16px;
            color: #3A3A3A;
            line-height: 1.5;
        }

        .footer {
            background-color: #F8F8F8;
            border-top: 1px solid #EAEAEA;
            padding: 36px 0;
            text-align: center;
            font-size: 14px;
            color: #5A5A5A;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            border-radius: 24px;
            position: relative;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 16px;
            font-size: 28px;
            cursor: pointer;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border: 1px solid #D0D0D0;
            border-radius: 48px;
            font-size: 14px;
        }

        .modal-content button {
            width: 100%;
            margin-top: 12px;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                align-items: flex-start;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: flex-start;
            }
            .hero h1 {
                font-size: 48px;
            }
            .tagline {
                font-size: 18px;
            }
            .btn-dark {
                font-size: 18px;
                padding: 12px 28px;
            }
        }
    </style>
    <script src="https://esm.sh/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="navbar">
                <a href="index.html" class="logo">ApexFit</a>
                <ul class="nav-links">
                    <li><a href="plan.html">方案设计</a></li>
                    <li><a href="map.html">场地查询</a></li>
                    <li><a href="social.html">运动社区</a></li>
                </ul>
                <div class="user-area" id="userArea">
                    <button class="btn-outline-small" id="loginBtn">登录</button>
                    <button class="btn-dark-small" id="registerBtn">注册</button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="hero">
            <div class="container">
                <h1>ApexFit</h1>
                <p class="tagline">我们不做课程，只做你的专属训练体系</p>
                <a href="plan.html" class="btn-dark" id="generateBtn">生成你的专属训练方案 →</a>
            </div>
        </div>

        <section class="features">
            <div class="container">
                <h2 class="section-title">为何选择 ApexFit</h2>
                <div class="features-grid">
                    <div class="feature-card"><div class="feature-icon">🏋️‍♂️</div><h3>科学评估</h3><p>基于运动科学+身体数据，生成精准训练蓝图。</p></div>
                    <div class="feature-card"><div class="feature-icon">⚡</div><h3>动态适应</h3><p>实时反馈，体系不断进化，匹配你的进步曲线。</p></div>
                    <div class="feature-card"><div class="feature-icon">🎯</div><h3>专属体系</h3><p>非固定课程，而是为你量身打造的完整训练系统。</p></div>
                    <div class="feature-card"><div class="feature-icon">📊</div><h3>数据追踪</h3><p>量化成果，清晰看见每一次突破。</p></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 ApexFit — 专属训练体系 · 运动即自由</p>
        </div>
    </footer>

    <!-- 登录/注册模态框 -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="loginForm">
                <h3>登录</h3>
                <input type="text" id="loginUsername" placeholder="用户名">
                <input type="password" id="loginPassword" placeholder="密码">
                <button class="btn-dark" id="doLoginBtn">登录</button>
                <p>没有账号？ <a id="switchToRegister">立即注册</a></p>
            </div>
            <div id="registerForm" style="display:none;">
                <h3>注册</h3>
                <input type="text" id="regUsername" placeholder="用户名">
                <input type="password" id="regPassword" placeholder="密码">
                <input type="password" id="regConfirmPassword" placeholder="确认密码">
                <button class="btn-dark" id="doRegisterBtn">注册</button>
                <p>已有账号？ <a id="switchToLogin">返回登录</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        const SUPABASE_URL = 'https://mlvyibpftjdseaodlqff.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sdnlpYnBmdGpkc2Vhb2RscWZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjY4MzIsImV4cCI6MjA5MTY0MjgzMn0.fZiHQ9IHIO6dkt7nNxmu5eNmkuYfxjlw6mKMX-eTI6I';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;

        // DOM elements
        const userArea = document.getElementById('userArea');
        const authModal = document.getElementById('authModal');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const closeBtn = document.querySelector('.close');
        const doLoginBtn = document.getElementById('doLoginBtn');
        const doRegisterBtn = document.getElementById('doRegisterBtn');
        const switchToRegister = document.getElementById('switchToRegister');
        const switchToLogin = document.getElementById('switchToLogin');

        function showModal() { authModal.style.display = 'block'; }
        function hideModal() { authModal.style.display = 'none'; }

        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            if (!username || !password) { alert('请填写完整'); return; }
            if (password !== confirm) { alert('密码不一致'); return; }
            if (password.length < 6) { alert('密码至少6位'); return; }
            try {
                const email = username + '@apexfit.local';
                const { data, error } = await supabase.auth.signUp({
                    email, password,
                    options: { data: { username } }
                });
                if (error) throw error;
                currentUser = { id: data.user.id, username };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                alert('注册成功');
                hideModal();
                updateUI();
            } catch (err) { alert('注册失败: ' + err.message); }
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!username || !password) { alert('请填写完整'); return; }
            try {
                const email = username + '@apexfit.local';
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                currentUser = { id: data.user.id, username };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                alert('登录成功');
                hideModal();
                updateUI();
            } catch (err) { alert('登录失败: ' + err.message); }
        }

        function handleLogout() {
            supabase.auth.signOut();
            currentUser = null;
            localStorage.removeItem('currentUser');
            updateUI();
            alert('已退出');
        }

        function updateUI() {
            if (currentUser) {
                userArea.innerHTML = `
                    <span class="username-btn" id="profileBtn">${currentUser.username}</span>
                    <button class="btn-outline-small" id="logoutBtn">退出</button>
                `;
                document.getElementById('profileBtn')?.addEventListener('click', () => { window.location.href = 'profile.html'; });
                document.getElementById('logoutBtn')?.addEventListener('click', handleLogout);
            } else {
                userArea.innerHTML = `
                    <button class="btn-outline-small" id="loginBtn">登录</button>
                    <button class="btn-dark-small" id="registerBtn">注册</button>
                `;
                document.getElementById('loginBtn')?.addEventListener('click', () => {
                    document.getElementById('loginForm').style.display = 'block';
                    document.getElementById('registerForm').style.display = 'none';
                    showModal();
                });
                document.getElementById('registerBtn')?.addEventListener('click', () => {
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('registerForm').style.display = 'block';
                    showModal();
                });
            }
        }

        async function restoreSession() {
            const stored = localStorage.getItem('currentUser');
            if (stored) currentUser = JSON.parse(stored);
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { currentUser = null; localStorage.removeItem('currentUser'); }
            updateUI();
        }

        // 事件绑定
        switchToRegister?.addEventListener('click', (e) => { e.preventDefault(); document.getElementById('loginForm').style.display = 'none'; document.getElementById('registerForm').style.display = 'block'; });
        switchToLogin?.addEventListener('click', (e) => { e.preventDefault(); document.getElementById('loginForm').style.display = 'block'; document.getElementById('registerForm').style.display = 'none'; });
        doLoginBtn?.addEventListener('click', handleLogin);
        doRegisterBtn?.addEventListener('click', handleRegister);
        closeBtn?.addEventListener('click', hideModal);
        window.addEventListener('click', (e) => { if (e.target === authModal) hideModal(); });

        restoreSession();
    </script>
</body>
</html>
