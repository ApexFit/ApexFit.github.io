<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexFit | 运动社区</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFFFFF;
            color: #000000;
            font-family: '微软雅黑', 'Microsoft YaHei', sans-serif;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .header {
            background-color: #FFFFFF;
            border-bottom: 1px solid #E6E6E6;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #000000;
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 36px;
        }

        .nav-menu li a {
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            color: #1A1A1A;
            padding-bottom: 4px;
            border-bottom: 2px solid transparent;
        }

        .nav-menu li a:hover,
        .nav-menu li a.active {
            border-bottom-color: #000000;
        }

        .auth-buttons {
            display: flex;
            gap: 12px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-outline-small {
            background: transparent;
            border: 1px solid #AAAAAA;
            color: #2C2C2C;
            padding: 8px 16px;
            border-radius: 48px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-dark-small {
            background: #000000;
            color: #FFFFFF;
            border: none;
            padding: 8px 16px;
            border-radius: 48px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-dark {
            background: #000000;
            color: #FFFFFF;
            border: none;
            padding: 12px 28px;
            border-radius: 48px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-dark:hover {
            background: #333333;
        }

        .social-main {
            padding: 48px 0;
            min-height: 60vh;
        }

        .welcome-card {
            background: #FFFFFF;
            border: 1px solid #EAEAEA;
            border-radius: 24px;
            padding: 48px;
            text-align: center;
        }

        .welcome-card h2 {
            font-size: 32px;
            margin-bottom: 16px;
        }

        .welcome-card p {
            color: #666;
            margin-bottom: 24px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            border-radius: 24px;
            position: relative;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 16px;
            font-size: 28px;
            cursor: pointer;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border: 1px solid #D0D0D0;
            border-radius: 48px;
            font-size: 14px;
            font-family: '微软雅黑', sans-serif;
        }

        .modal-content button {
            width: 100%;
            margin-top: 12px;
        }

        .modal-content h3 {
            margin-bottom: 16px;
        }

        .modal-content p {
            margin-top: 16px;
            text-align: center;
        }

        .modal-content a {
            color: #000;
            text-decoration: underline;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .posts-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .post-item {
            background: #FFFFFF;
            border: 1px solid #EAEAEA;
            border-radius: 20px;
            padding: 20px;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #F0F0F0;
        }

        .post-author {
            font-weight: 700;
            font-size: 16px;
        }

        .post-time {
            font-size: 12px;
            color: #999;
        }

        .post-content {
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .post-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin: 12px 0;
        }

        .post-actions {
            display: flex;
            gap: 24px;
            padding-top: 12px;
            border-top: 1px solid #F0F0F0;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .liked {
            color: #ff4444;
        }

        .comments-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #F0F0F0;
        }

        .comment-input {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .comment-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #D0D0D0;
            border-radius: 24px;
            font-size: 13px;
        }

        .comment-input button {
            padding: 6px 16px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 24px;
            cursor: pointer;
        }

        .comment-list {
            margin-top: 12px;
        }

        .comment-item {
            font-size: 13px;
            padding: 6px 0;
            color: #555;
        }

        .comment-author {
            font-weight: 600;
            margin-right: 8px;
        }

        .post-section {
            margin-bottom: 32px;
        }

        .post-card {
            background: #FFFFFF;
            border: 1px solid #EAEAEA;
            border-radius: 24px;
            padding: 24px;
        }

        .post-card textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 1px solid #D0D0D0;
            border-radius: 16px;
            font-family: '微软雅黑', sans-serif;
            font-size: 14px;
            resize: vertical;
        }

        .image-upload {
            margin: 16px 0;
        }

        .upload-label {
            display: inline-block;
            padding: 8px 16px;
            background: #F5F5F5;
            border-radius: 48px;
            cursor: pointer;
            font-size: 14px;
        }

        #postImage {
            display: none;
        }

        #imagePreview {
            margin-top: 12px;
            max-width: 200px;
        }

        #imagePreview img {
            width: 100%;
            border-radius: 12px;
        }

        .social-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 32px;
        }

        @media (max-width: 768px) {
            .social-layout {
                grid-template-columns: 1fr;
            }
        }

        .footer {
            background-color: #F8F8F8;
            border-top: 1px solid #EAEAEA;
            padding: 24px 0;
            text-align: center;
            font-size: 13px;
            color: #5A5A5A;
            margin-top: 40px;
        }
        
        .error-banner {
            background: #FFF0F0;
            border: 1px solid #FFCCCC;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .error-banner button {
            margin-top: 12px;
        }
    </style>
    <!-- 使用多个备用CDN -->
    <script>
        // 手动加载 Supabase，尝试多个CDN
        function loadSupabase(cdnIndex) {
            const cdns = [
                'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/index.js',
                'https://unpkg.com/@supabase/supabase-js@2/dist/umd/index.js',
                'https://cdn.skypack.dev/@supabase/supabase-js@2'
            ];
            
            if (cdnIndex >= cdns.length) {
                console.error('所有CDN都加载失败');
                document.getElementById('mainContent').innerHTML = `
                    <div class="error-banner">
                        <h3>⚠️ 网络连接问题</h3>
                        <p>无法加载 Supabase SDK，请检查网络连接后刷新页面重试。</p>
                        <button class="btn-dark" onclick="location.reload()">刷新重试</button>
                    </div>
                `;
                return;
            }
            
            const script = document.createElement('script');
            script.src = cdns[cdnIndex];
            script.onload = function() {
                console.log('Supabase SDK 加载成功:', cdns[cdnIndex]);
                window.supabaseLoaded = true;
                initApp();
            };
            script.onerror = function() {
                console.log('加载失败，尝试下一个CDN:', cdns[cdnIndex]);
                loadSupabase(cdnIndex + 1);
            };
            document.head.appendChild(script);
        }
        
        // 启动加载
        loadSupabase(0);
    </script>
</head>
<body>

<header class="header">
    <div class="container">
        <div class="navbar">
            <a href="#" class="logo">ApexFit</a>
            <ul class="nav-menu">
                <li><a href="#" id="nav-home">首页</a></li>
                <li><a href="#" id="nav-social" class="active">运动社区</a></li>
                <li><a href="#" id="nav-profile">个人中心</a></li>
            </ul>
            <div class="auth-buttons" id="authButtons">
                <button class="btn-outline-small" id="loginBtn">登录</button>
                <button class="btn-dark-small" id="registerBtn">注册</button>
            </div>
            <div class="user-info" id="userInfo" style="display:none;">
                <span id="usernameDisplay"></span>
                <button class="btn-outline-small" id="logoutBtn">退出</button>
            </div>
        </div>
    </div>
</header>

<main class="social-main">
    <div class="container">
        <div id="mainContent">
            <div class="loading">正在加载...</div>
        </div>
    </div>
</main>

<!-- 登录模态框 -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        
        <div id="loginForm">
            <h3>登录</h3>
            <input type="text" id="loginUsername" placeholder="用户名">
            <input type="password" id="loginPassword" placeholder="密码">
            <button class="btn-dark" id="doLoginBtn">登录</button>
            <p>没有账号？ <a id="switchToRegister">立即注册</a></p>
        </div>
        
        <div id="registerForm" style="display:none;">
            <h3>注册</h3>
            <input type="text" id="regUsername" placeholder="用户名">
            <input type="password" id="regPassword" placeholder="密码">
            <input type="password" id="regConfirmPassword" placeholder="确认密码">
            <button class="btn-dark" id="doRegisterBtn">注册</button>
            <p>已有账号？ <a id="switchToLogin">返回登录</a></p>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p>© 2025 ApexFit — 运动社区，分享你的进步</p>
    </div>
</footer>

<script>
    // ==================== Supabase 配置 ====================
    const SB_URL = 'https://mlvyibpftjdseaodlqff.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sdnlpYnBmdGpkc2Vhb2RscWZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjY4MzIsImV4cCI6MjA5MTY0MjgzMn0.fZiHQ9IHIO6dkt7nNxmu5eNmkuYfxjlw6mKMX-eTI6I';
    
    let supabaseClient = null;
    let currentUser = null;
    let appInitialized = false;
    
    // ==================== 初始化应用 ====================
    function initApp() {
        if (appInitialized) return;
        if (!window.supabase) {
            console.log('等待 Supabase...');
            setTimeout(initApp, 200);
            return;
        }
        
        console.log('Supabase 已就绪，初始化应用...');
        supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
        appInitialized = true;
        
        restoreSession();
        renderMainContent();
        bindAuthEvents();
        bindNavEvents();
    }
    
    // ==================== 渲染主内容 ====================
    function renderMainContent() {
        const container = document.getElementById('mainContent');
        if (!container) return;
        
        if (currentUser) {
            container.innerHTML = `
                <div class="social-layout">
                    <div class="post-section">
                        <div class="post-card">
                            <h3>发布动态</h3>
                            <textarea id="postContent" placeholder="分享你的运动瞬间..." maxlength="500"></textarea>
                            <div class="image-upload">
                                <input type="file" id="postImage" accept="image/*">
                                <label for="postImage" class="upload-label">📷 添加图片</label>
                                <div id="imagePreview"></div>
                            </div>
                            <button class="btn-dark" id="publishBtn">发布 →</button>
                        </div>
                    </div>
                    <div class="feed-section">
                        <h3>最新动态</h3>
                        <div id="postsList" class="posts-list">
                            <div class="loading">加载中...</div>
                        </div>
                    </div>
                </div>
            `;
            loadPosts();
            bindPostEvents();
        } else {
            container.innerHTML = `
                <div class="welcome-card">
                    <h2>🏋️ 运动社区</h2>
                    <p>登录后可以发布动态、分享运动瞬间、与其他运动爱好者交流</p>
                    <button class="btn-dark" id="getStartedBtn">立即开始</button>
                </div>
            `;
            const getStartedBtn = document.getElementById('getStartedBtn');
            if (getStartedBtn) {
                getStartedBtn.onclick = function() {
                    document.getElementById('loginForm').style.display = 'block';
                    document.getElementById('registerForm').style.display = 'none';
                    document.getElementById('authModal').style.display = 'block';
                };
            }
        }
    }
    
    function bindPostEvents() {
        const publishBtn = document.getElementById('publishBtn');
        if (publishBtn) publishBtn.onclick = publishPost;
        
        const postImage = document.getElementById('postImage');
        if (postImage) {
            postImage.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        document.getElementById('imagePreview').innerHTML = `<img src="${event.target.result}" style="max-width:100%;border-radius:12px;">`;
                    };
                    reader.readAsDataURL(file);
                }
            };
        }
    }
    
    // ==================== 认证函数 ====================
    async function handleRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPassword').value;
        
        if (!username) { alert('请输入用户名'); return; }
        if (!password) { alert('请输入密码'); return; }
        if (password !== confirm) { alert('两次密码不一致'); return; }
        if (password.length < 6) { alert('密码至少6位'); return; }
        
        try {
            const email = username + '@apexfit.local';
            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: { data: { username: username } }
            });
            
            if (error) throw error;
            
            currentUser = { id: data.user.id, username: username };
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            
            alert('注册成功！');
            document.getElementById('authModal').style.display = 'none';
            updateUI();
            renderMainContent();
            
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regConfirmPassword').value = '';
            
        } catch (err) {
            alert('注册失败: ' + err.message);
        }
    }
    
    async function handleLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!username) { alert('请输入用户名'); return; }
        if (!password) { alert('请输入密码'); return; }
        
        try {
            const email = username + '@apexfit.local';
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) throw error;
            
            currentUser = { id: data.user.id, username: username };
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            
            alert('登录成功！');
            document.getElementById('authModal').style.display = 'none';
            updateUI();
            renderMainContent();
            
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            
        } catch (err) {
            alert('登录失败: ' + err.message);
        }
    }
    
    function handleLogout() {
        supabaseClient.auth.signOut();
        currentUser = null;
        localStorage.removeItem('currentUser');
        updateUI();
        renderMainContent();
        alert('已退出登录');
    }
    
    function updateUI() {
        const authButtons = document.getElementById('authButtons');
        const userInfo = document.getElementById('userInfo');
        const usernameDisplay = document.getElementById('usernameDisplay');
        
        if (currentUser) {
            authButtons.style.display = 'none';
            userInfo.style.display = 'flex';
            usernameDisplay.textContent = currentUser.username;
        } else {
            authButtons.style.display = 'flex';
            userInfo.style.display = 'none';
        }
    }
    
    async function restoreSession() {
        const stored = localStorage.getItem('currentUser');
        if (stored) {
            currentUser = JSON.parse(stored);
        }
        
        if (supabaseClient) {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                currentUser = null;
                localStorage.removeItem('currentUser');
            }
        }
        
        updateUI();
    }
    
    // ==================== 帖子函数 ====================
    async function publishPost() {
        if (!currentUser) {
            alert('请先登录');
            return;
        }
        
        const content = document.getElementById('postContent').value.trim();
        const imageFile = document.getElementById('postImage').files[0];
        
        if (!content && !imageFile) {
            alert('请填写内容或添加图片');
            return;
        }
        
        let imageBase64 = null;
        if (imageFile) {
            const reader = new FileReader();
            imageBase64 = await new Promise((resolve) => {
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(imageFile);
            });
        }
        
        const { error } = await supabaseClient.from('posts').insert([{
            content: content,
            author: currentUser.username,
            author_id: currentUser.id,
            image: imageBase64,
            likes: 0,
            created_at: new Date().toISOString()
        }]);
        
        if (error) {
            alert('发布失败: ' + error.message);
        } else {
            document.getElementById('postContent').value = '';
            document.getElementById('postImage').value = '';
            document.getElementById('imagePreview').innerHTML = '';
            loadPosts();
        }
    }
    
    async function loadPosts() {
        const container = document.getElementById('postsList');
        if (!container) return;
        
        container.innerHTML = '<div class="loading">加载中...</div>';
        
        const { data: posts, error } = await supabaseClient
            .from('posts')
            .select('*')
            .order('created_at', { ascending: false });
        
        if (error || !posts || posts.length === 0) {
            container.innerHTML = '<div class="loading">暂无动态，快来发布第一条吧！</div>';
            return;
        }
        
        container.innerHTML = '';
        for (const post of posts) {
            const { data: comments } = await supabaseClient
                .from('comments')
                .select('*')
                .eq('post_id', post.id)
                .order('created_at');
            
            const timeStr = formatTime(new Date(post.created_at));
            
            const postDiv = document.createElement('div');
            postDiv.className = 'post-item';
            postDiv.innerHTML = `
                <div class="post-header">
                    <span class="post-author">🏋️ ${escapeHtml(post.author)}</span>
                    <span class="post-time">${timeStr}</span>
                </div>
                <div class="post-content">${escapeHtml(post.content || '')}</div>
                ${post.image ? `<img src="${post.image}" class="post-image">` : ''}
                <div class="post-actions">
                    <button class="action-btn like-btn" data-id="${post.id}">❤️ ${post.likes || 0}</button>
                    <button class="action-btn comment-btn" data-id="${post.id}">💬 ${comments?.length || 0}</button>
                </div>
                <div class="comments-section" id="comments-${post.id}" style="display:none;">
                    <div class="comment-list">
                        ${comments?.map(c => `<div class="comment-item"><span class="comment-author">${escapeHtml(c.author)}:</span> ${escapeHtml(c.content)}</div>`).join('')}
                    </div>
                    <div class="comment-input">
                        <input type="text" id="comment-input-${post.id}" placeholder="写下评论...">
                        <button onclick="window.addComment('${post.id}')">发送</button>
                    </div>
                </div>
            `;
            container.appendChild(postDiv);
        }
        
        // 绑定点赞
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.onclick = async () => {
                if (!currentUser) { alert('请先登录'); return; }
                const postId = btn.getAttribute('data-id');
                await supabaseClient.rpc('increment_likes', { post_id: parseInt(postId) });
                loadPosts();
            };
        });
        
        // 绑定评论展开
        document.querySelectorAll('.comment-btn').forEach(btn => {
            btn.onclick = () => {
                const postId = btn.getAttribute('data-id');
                const div = document.getElementById(`comments-${postId}`);
                div.style.display = div.style.display === 'none' ? 'block' : 'none';
            };
        });
    }
    
    window.addComment = async function(postId) {
        if (!currentUser) { alert('请先登录'); return; }
        const input = document.getElementById(`comment-input-${postId}`);
        const content = input.value.trim();
        if (!content) return;
        
        await supabaseClient.from('comments').insert([{
            post_id: parseInt(postId),
            content: content,
            author: currentUser.username,
            author_id: currentUser.id,
            created_at: new Date().toISOString()
        }]);
        input.value = '';
        loadPosts();
    };
    
    function formatTime(date) {
        const diff = Date.now() - date;
        const minutes = Math.floor(diff / 60000);
        if (minutes < 1) return '刚刚';
        if (minutes < 60) return minutes + '分钟前';
        if (minutes < 1440) return Math.floor(minutes / 60) + '小时前';
        return Math.floor(minutes / 1440) + '天前';
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ==================== 事件绑定 ====================
    function bindAuthEvents() {
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const closeBtn = document.querySelector('.close');
        const modal = document.getElementById('authModal');
        const switchToRegister = document.getElementById('switchToRegister');
        const switchToLogin = document.getElementById('switchToLogin');
        const doLoginBtn = document.getElementById('doLoginBtn');
        const doRegisterBtn = document.getElementById('doRegisterBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        
        if (loginBtn) {
            loginBtn.onclick = function() {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
                modal.style.display = 'block';
            };
        }
        
        if (registerBtn) {
            registerBtn.onclick = function() {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
                modal.style.display = 'block';
            };
        }
        
        if (closeBtn) closeBtn.onclick = function() { modal.style.display = 'none'; };
        if (switchToRegister) switchToRegister.onclick = function(e) {
            e.preventDefault();
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        };
        if (switchToLogin) switchToLogin.onclick = function(e) {
            e.preventDefault();
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        };
        if (doLoginBtn) doLoginBtn.onclick = handleLogin;
        if (doRegisterBtn) doRegisterBtn.onclick = handleRegister;
        if (logoutBtn) logoutBtn.onclick = handleLogout;
        
        window.onclick = function(e) {
            if (e.target === modal) modal.style.display = 'none';
        };
    }
    
    function bindNavEvents() {
        const navHome = document.getElementById('nav-home');
        const navProfile = document.getElementById('nav-profile');
        
        if (navHome) navHome.onclick = function(e) { e.preventDefault(); alert('首页正在建设中'); };
        if (navProfile) {
            navProfile.onclick = function(e) {
                e.preventDefault();
                if (currentUser) alert(`欢迎 ${currentUser.username}！个人中心即将上线`);
                else alert('请先登录');
            };
        }
    }
    
    // 页面加载完成后尝试初始化
    document.addEventListener('DOMContentLoaded', function() {
        initApp();
    });
</script>
