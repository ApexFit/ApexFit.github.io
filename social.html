    <style>

            margin: 0;
            padding: 0;

        }

        .modal {

    </style>

<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const SUPABASE_URL = 'https://mlvyibpftjdseaodlqff.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sdnlpYnBmdGpkc2Vhb2RscWZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjY4MzIsImV4cCI6MjA5MTY0MjgzMn0.fZiHQ9IHIO6dkt7nNxmu5eNmkuYfxjlw6mKMX-eTI6I';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;
    let currentPage = 1, hasMore = true, isLoading = false, likedPosts = new Set();

    // 高德地图相关
    let locationMap = null;
    let locationGeocoder = null;
    let selectedAddress = "";
    let mapInitialized = false;

    // DOM 元素
    const userArea = document.getElementById('userArea');
    const authModal = document.getElementById('authModal');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const closeBtn = document.querySelector('.close');
    const doLoginBtn = document.getElementById('doLoginBtn');
    const doRegisterBtn = document.getElementById('doRegisterBtn');
    const switchToRegister = document.getElementById('switchToRegister');
    const switchToLogin = document.getElementById('switchToLogin');
    const logoutBtn = document.getElementById('logoutBtn');
    const postContent = document.getElementById('postContent');
    const postImage = document.getElementById('postImage');
    const imagePreview = document.getElementById('imagePreview');
    const publishBtn = document.getElementById('publishBtn');
    const selectLocationBtn = document.getElementById('selectLocationBtn');
    const locationDisplayDiv = document.getElementById('locationDisplay');
    const clearLocationBtn = document.getElementById('clearLocationBtn');
    const locationModal = document.getElementById('locationModal');
    const locationSearchInput = document.getElementById('locationSearchInput');
    const locationSearchBtn = document.getElementById('locationSearchBtn');
    const locationResult = document.getElementById('locationResult');
    const confirmLocationBtn = document.getElementById('confirmLocationBtn');

    // ==================== 认证逻辑 ====================
    function showModal() { authModal.style.display = 'block'; }
    function hideModal() { authModal.style.display = 'none'; }
    async function handleRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPassword').value;
        if (!username || !password) { alert('请填写完整'); return; }
        if (password !== confirm) { alert('密码不一致'); return; }
        if (password.length < 6) { alert('密码至少6位'); return; }
        try {
            const email = username + '@apexfit.local';
            const { data, error } = await supabase.auth.signUp({ email, password, options: { data: { username } } });
            if (error) throw error;
            currentUser = { id: data.user.id, username };
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            alert('注册成功'); hideModal(); updateUI(); loadPosts(true);
        } catch (err) { alert('注册失败: ' + err.message); }
    }
    async function handleLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) { alert('请填写完整'); return; }
        try {
            const email = username + '@apexfit.local';
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            currentUser = { id: data.user.id, username };
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            alert('登录成功'); hideModal(); updateUI(); loadPosts(true);
        } catch (err) { alert('登录失败: ' + err.message); }
    }
    function handleLogout() { supabase.auth.signOut(); currentUser = null; localStorage.removeItem('currentUser'); updateUI(); loadPosts(true); alert('已退出'); }
    function updateUI() {
        if (currentUser) {
            userArea.innerHTML = `<span class="username-btn" id="profileBtn">${currentUser.username}</span><button class="btn-outline-small" id="logoutBtn">退出</button>`;
            document.getElementById('profileBtn')?.addEventListener('click', () => window.location.href = 'profile.html');
            document.getElementById('logoutBtn')?.addEventListener('click', handleLogout);
        } else {
            userArea.innerHTML = `<button class="btn-outline-small" id="loginBtn">登录</button><button class="btn-dark-small" id="registerBtn">注册</button>`;
            document.getElementById('loginBtn')?.addEventListener('click', () => { document.getElementById('loginForm').style.display='block'; document.getElementById('registerForm').style.display='none'; showModal(); });
            document.getElementById('registerBtn')?.addEventListener('click', () => { document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='block'; showModal(); });
        }
    }
    async function restoreSession() {
        const stored = localStorage.getItem('currentUser');
        if (stored) currentUser = JSON.parse(stored);
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) { currentUser = null; localStorage.removeItem('currentUser'); }
        updateUI();
    }

    // ==================== 帖子相关函数（保留原有分页、点赞、评论） ====================
    async function publishPost() {
        if (!currentUser) { alert('请先登录'); return; }
        let content = postContent.value.trim();
        const imageFile = postImage.files[0];
        if (!content && !imageFile) { alert('请填写内容或添加图片'); return; }
        // 如果有选中的地点，附加到正文末尾
        if (selectedAddress) {
            content = content + (content ? "\n" : "") + "📍 地点：" + selectedAddress;
        }
        let imageBase64 = null;
        if (imageFile) {
            const reader = new FileReader();
            imageBase64 = await new Promise((resolve) => { reader.onload = (e) => resolve(e.target.result); reader.readAsDataURL(imageFile); });
        }
        const { error } = await supabase.from('posts').insert([{
            content: content,
            author: currentUser.username,
            author_id: currentUser.id,
            image: imageBase64,
            likes: 0,
            created_at: new Date().toISOString()
        }]);
        if (error) { alert('发布失败: ' + error.message); } else {
            postContent.value = ''; postImage.value = ''; imagePreview.innerHTML = '';
            selectedAddress = ""; updateLocationUI();
            loadPosts(true);
        }
    }

    async function loadPosts(refresh = false) {
        const container = document.getElementById('postsList');
        const loadMoreContainer = document.getElementById('loadMoreContainer');
        if (!container) return;
        if (refresh) { currentPage = 1; hasMore = true; isLoading = false; container.innerHTML = '<div class="loading">加载中...</div>'; }
        if (isLoading) return;
        isLoading = true;
        try {
            const from = (currentPage - 1) * 10;
            const to = from + 9;
            const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('请求超时')), 30000));
            const fetchPromise = supabase.from('posts').select('*', { count: 'exact' }).order('created_at', { ascending: false }).range(from, to);
            const { data: posts, error, count } = await Promise.race([fetchPromise, timeout]);
            if (error) throw error;
            if (refresh) container.innerHTML = '';
            if (!posts || posts.length === 0) {
                if (refresh) container.innerHTML = '<div class="loading">暂无动态，快来发布第一条吧！</div>';
                hasMore = false; loadMoreContainer.innerHTML = ''; isLoading = false; return;
            }
            for (const post of posts) {
                const { data: comments } = await supabase.from('comments').select('*').eq('post_id', post.id).order('created_at', { ascending: true });
                const timeStr = formatTime(post.created_at);
                const postDiv = document.createElement('div'); postDiv.className = 'post-item';
                postDiv.innerHTML = `
                    <div class="post-header"><span class="post-author">🏋️ ${escapeHtml(post.author)}</span><span class="post-time">${timeStr}</span></div>
                    <div class="post-content">${escapeHtml(post.content || '')}</div>
                    ${post.image ? `<img src="${post.image}" class="post-image" loading="lazy">` : ''}
                    <div class="post-actions">
                        <button class="action-btn like-btn" data-id="${post.id}" data-likes="${post.likes || 0}">❤️ ${post.likes || 0}</button>
                        <button class="action-btn comment-btn" data-id="${post.id}">💬 ${comments?.length || 0}</button>
                    </div>
                    <div class="comments-section" id="comments-${post.id}" style="display:none;">
                        <div class="comment-list">${comments?.map(c => `<div class="comment-item"><span class="comment-author">${escapeHtml(c.author)}:</span> ${escapeHtml(c.content)}</div>`).join('')}</div>
                        <div class="comment-input"><input type="text" id="comment-input-${post.id}" placeholder="写下评论..."><button class="submit-comment-btn" data-id="${post.id}">发送</button></div>
                    </div>
                `;
                container.appendChild(postDiv);
            }
            // 绑定点赞、评论等事件（与之前相同）
            document.querySelectorAll('.like-btn').forEach(btn => {
                const newBtn = btn.cloneNode(true);
                btn.parentNode.replaceChild(newBtn, btn);
                newBtn.onclick = async (e) => {
                    e.stopPropagation();
                    if (!currentUser) { alert('请先登录'); return; }
                    const postId = parseInt(newBtn.dataset.id);
                    const currentLikes = parseInt(newBtn.dataset.likes);
                    if (likedPosts.has(postId)) { alert('你已经点过赞了！'); return; }
                    if (newBtn.disabled) return;
                    newBtn.disabled = true; newBtn.style.opacity = '0.5';
                    try {
                        const newLikes = currentLikes + 1;
                        const { error } = await supabase.from('posts').update({ likes: newLikes }).eq('id', postId);
                        if (error) throw error;
                        likedPosts.add(postId);
                        newBtn.innerHTML = `❤️ ${newLikes}`; newBtn.dataset.likes = newLikes;
                    } catch (err) { alert('点赞失败: ' + err.message); }
                    finally { newBtn.disabled = false; newBtn.style.opacity = '1'; }
                };
            });
            document.querySelectorAll('.comment-btn').forEach(btn => {
                btn.onclick = (e) => { e.stopPropagation(); const id = btn.dataset.id; const div = document.getElementById(`comments-${id}`); if (div) div.style.display = div.style.display === 'none' ? 'block' : 'none'; };
            });
            document.querySelectorAll('.submit-comment-btn').forEach(btn => {
                btn.onclick = async (e) => { e.stopPropagation(); const postId = btn.dataset.id; await addComment(postId); };
            });
            hasMore = posts.length === 10;
            if (loadMoreContainer) {
                if (hasMore) {
                    loadMoreContainer.innerHTML = `<button class="btn-outline-small" id="loadMoreBtn">加载更多 ↓</button>`;
                    document.getElementById('loadMoreBtn')?.addEventListener('click', () => { if (!isLoading && hasMore) { currentPage++; loadPosts(false); } });
                } else {
                    loadMoreContainer.innerHTML = '<div style="text-align:center;padding:16px;color:#999;">已经到底了</div>';
                }
            }
        } catch (err) { console.error(err); if (refresh) container.innerHTML = `<div class="error-msg">加载失败: ${err.message}<br><button class="btn-outline-small" onclick="location.reload()">刷新重试</button></div>`; }
        finally { isLoading = false; }
    }

    async function addComment(postId) {
        if (!currentUser) { alert('请先登录'); return; }
        const input = document.getElementById(`comment-input-${postId}`);
        const content = input.value.trim();
        if (!content) return;
        const { error } = await supabase.from('comments').insert([{ post_id: parseInt(postId), content, author: currentUser.username, author_id: currentUser.id, created_at: new Date().toISOString() }]);
        if (error) alert('评论失败: ' + error.message);
        else { input.value = ''; loadPosts(true); }
    }

    function formatTime(dateStr) {
        const utcDate = new Date(dateStr); if (isNaN(utcDate)) return '刚刚';
        const now = new Date(); const offset = now.getTimezoneOffset(); const localTime = utcDate.getTime() - offset * 60000;
        const diff = now.getTime() - localTime; const minutes = Math.floor(diff / 60000);
        if (minutes < 1) return '刚刚'; if (minutes < 60) return minutes + '分钟前';
        if (minutes < 1440) return Math.floor(minutes / 60) + '小时前';
        return Math.floor(minutes / 1440) + '天前';
    }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    // ==================== 地点选择功能 ====================
    function initLocationMap() {
        if (mapInitialized) return;
        locationMap = new AMap.Map('locationMap', { zoom: 13, center: [116.397428, 39.90923], resizeEnable: true });
        locationGeocoder = new AMap.Geocoder({ city: "全国" });
        // 点击地图获取地址
        locationMap.on('click', async (e) => {
            const lnglat = e.lnglat;
            locationGeocoder.getAddress([lnglat.getLng(), lnglat.getLat()], (status, result) => {
                if (status === 'complete' && result.regeocode) {
                    const address = result.regeocode.formattedAddress;
                    showLocationResult([{ name: address, address, location: lnglat }]);
                } else { alert('获取地址失败'); }
            });
        });
        mapInitialized = true;
    }

    async function searchLocation(keyword) {
        if (!keyword.trim()) return;
        const placeSearch = new AMap.PlaceSearch({ pageSize: 10, city: '全国' });
        placeSearch.search(keyword, (status, result) => {
            if (status === 'complete' && result.poiList && result.poiList.pois.length) {
                showLocationResult(result.poiList.pois);
                if (result.poiList.pois[0]) {
                    locationMap.setCenter([result.poiList.pois[0].location.lng, result.poiList.pois[0].location.lat]);
                    locationMap.setZoom(14);
                }
            } else { locationResult.innerHTML = '<div class="empty-tip">未找到相关地点</div>'; }
        });
    }

    function showLocationResult(pois) {
        if (!pois || pois.length === 0) { locationResult.innerHTML = '<div class="empty-tip">无结果</div>'; return; }
        let html = '';
        pois.forEach(poi => {
            const name = poi.name || poi.address;
            const addr = poi.address || poi.name;
            html += `<div class="location-option" data-name="${escapeHtml(name)}" data-addr="${escapeHtml(addr)}" style="padding:8px; border-bottom:1px solid #EEE; cursor:pointer;">
                        <strong>${escapeHtml(name)}</strong><br><small>${escapeHtml(addr)}</small>
                     </div>`;
        });
        locationResult.innerHTML = html;
        document.querySelectorAll('.location-option').forEach(opt => {
            opt.addEventListener('click', () => {
                const fullName = opt.dataset.name;
                const fullAddr = opt.dataset.addr;
                selectedAddress = fullName + (fullAddr && fullAddr !== fullName ? '（' + fullAddr + '）' : '');
                updateLocationUI();
                locationModal.style.display = 'none';
            });
        });
    }

    function updateLocationUI() {
        if (selectedAddress) {
            locationDisplayDiv.style.display = 'block';
            locationDisplayDiv.innerText = selectedAddress;
            clearLocationBtn.style.display = 'inline-block';
        } else {
            locationDisplayDiv.style.display = 'none';
            clearLocationBtn.style.display = 'none';
        }
    }

    // 事件绑定
    selectLocationBtn.addEventListener('click', () => {
        if (!locationMap) initLocationMap();
        locationModal.style.display = 'block';
        locationSearchInput.value = '';
        locationResult.innerHTML = '<div class="empty-tip">点击地图选点或搜索地点</div>';
    });
    clearLocationBtn.addEventListener('click', () => { selectedAddress = ""; updateLocationUI(); });
    locationSearchBtn.addEventListener('click', () => { searchLocation(locationSearchInput.value); });
    document.querySelector('.close-location')?.addEventListener('click', () => { locationModal.style.display = 'none'; });
    confirmLocationBtn.addEventListener('click', () => { locationModal.style.display = 'none'; });
    window.addEventListener('click', (e) => { if (e.target === locationModal) locationModal.style.display = 'none'; });

    publishBtn.addEventListener('click', publishPost);
    postImage.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) { const reader = new FileReader(); reader.onload = (ev) => { imagePreview.innerHTML = `<img src="${ev.target.result}" style="max-width:100%;border-radius:12px;">`; }; reader.readAsDataURL(file); }
    });

    // 模态框通用事件
    switchToRegister?.addEventListener('click', (e) => { e.preventDefault(); document.getElementById('loginForm').style.display = 'none'; document.getElementById('registerForm').style.display = 'block'; });
    switchToLogin?.addEventListener('click', (e) => { e.preventDefault(); document.getElementById('loginForm').style.display = 'block'; document.getElementById('registerForm').style.display = 'none'; });
    doLoginBtn?.addEventListener('click', handleLogin);
    doRegisterBtn?.addEventListener('click', handleRegister);
    closeBtn?.addEventListener('click', hideModal);
    window.addEventListener('click', (e) => { if (e.target === authModal) hideModal(); });

    restoreSession();
    loadPosts(true);
</script>
</body>
</html>
